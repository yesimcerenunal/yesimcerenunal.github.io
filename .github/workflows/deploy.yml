# Builds with automatic Vite base from GITHUB_REPOSITORY (see vite.config.ts).
# Enable Pages: Settings → Pages → Source: GitHub Actions.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          npm run build

      - name: Verify dist/index.html uses repo-prefixed assets (project site)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -eu
          REPO="${GITHUB_REPOSITORY##*/}"
          echo "Repo segment: $REPO"
          if [ -z "$REPO" ] || [[ "$REPO" == *.github.io ]]; then
            echo "User/org Pages repo — expect /assets/ at site root; OK to skip."
            grep -E 'script |link ' dist/index.html || true
            exit 0
          fi
          if ! grep -qE "/${REPO}/assets/" dist/index.html; then
            echo "::error::dist/index.html must reference /${REPO}/assets/... (not /assets/... alone). Build must run in GitHub Actions with GITHUB_REPOSITORY set."
            head -25 dist/index.html
            exit 1
          fi
          echo "OK: index.html references /${REPO}/assets/"

      # Fail fast if gallery assets are missing (e.g. public/gallery not in git).
      # upload-pages-artifact packs the entire `dist/` folder; deploy-pages deploys that artifact only (no stale cache from prior runs).
      - name: Verify dist/gallery before deploy
        run: |
          set -eu
          echo "=== dist top-level ==="
          ls -la dist/
          echo ""
          if [ ! -d dist/gallery ]; then
            echo "::error::dist/gallery is missing after build. Ensure public/gallery is committed and copied by Vite."
            exit 1
          fi
          echo "=== dist/gallery: total files ==="
          find dist/gallery -type f | wc -l
          echo ""
          echo "=== sample image paths (raster) ==="
          find dist/gallery -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) | sort | head -20
          echo ""
          echo "=== first 30 files (any type) ==="
          find dist/gallery -type f | sort | head -30
          echo ""
          echo "=== dist/gallery size ==="
          du -sh dist/gallery

      # GitHub Pages serves 404.html for unknown paths — copy SPA shell so client routes work on refresh.
      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
